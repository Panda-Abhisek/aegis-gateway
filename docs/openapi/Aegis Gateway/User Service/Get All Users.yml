info:
  name: Get All Users
  type: http
  seq: 2
  tags:
    - User Service

http:
  method: GET
  url: "{{baseUrl}}/users"
  auth:
    type: bearer
    token: "{{JWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/users"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "name": "",
              "email": "",
              "tier": "",
              "message": ""
            }
          ]
