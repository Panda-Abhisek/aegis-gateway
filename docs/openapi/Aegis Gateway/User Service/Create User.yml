info:
  name: Create User
  type: http
  seq: 3
  tags:
    - User Service

http:
  method: POST
  url: "{{baseUrl}}/users"
  body:
    type: json
    data: |-
      {
        "name": "",
        "email": ""
      }
  auth:
    type: bearer
    token: "{{JWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Created
    request:
      url: "{{baseUrl}}/users"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "email": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "name": "",
            "email": "",
            "tier": "",
            "message": ""
          }
