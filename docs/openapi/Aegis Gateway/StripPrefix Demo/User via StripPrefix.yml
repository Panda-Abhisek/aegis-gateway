info:
  name: User via StripPrefix
  type: http
  seq: 1
  tags:
    - StripPrefix Demo

http:
  method: GET
  url: "{{baseUrl}}/api/users/strip-test"
  headers:
    - name: Authorization
      value: Bearer {{JWT}}
  auth:
    type: bearer
    token: "{{JWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/users/strip-test"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: User endpoint reached via StripPrefix

docs: Gateway strips /api via StripPrefix=1 and forwards /users/strip-test to user service
