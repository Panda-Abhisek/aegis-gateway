info:
  name: Order via StripPrefix
  type: http
  seq: 2
  tags:
    - StripPrefix Demo

http:
  method: GET
  url: "{{baseUrl}}/api/orders/strip-test"
  headers:
    - name: Authorization
      value: Bearer {{JWT}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/orders/strip-test"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: Order endpoint reached via StripPrefix

docs: Gateway strips /api via StripPrefix=1 and forwards /orders/strip-test to order service
