info:
  name: Get All Orders
  type: http
  seq: 2
  tags:
    - Order Service

http:
  method: GET
  url: "{{baseUrl}}/orders"
  headers:
    - name: Authorization
      value: Bearer {{JWT}}
    - name: X-API-Key
      value: admin-key
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/orders"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "userId": "",
              "product": "",
              "amount": 0,
              "status": "",
              "message": ""
            }
          ]
