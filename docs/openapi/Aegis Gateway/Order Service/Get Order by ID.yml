info:
  name: Get Order by ID
  type: http
  seq: 4
  tags:
    - Order Service

http:
  method: GET
  url: "{{baseUrl}}/orders/:id"
  headers:
    - name: Authorization
      value: Bearer {{JWT}}
  params:
    - name: id
      value: "1"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/orders/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "userId": "",
            "product": "",
            "amount": 0,
            "status": "",
            "message": ""
          }
