info:
  name: Create Order
  type: http
  seq: 3
  tags:
    - Order Service

http:
  method: POST
  url: "{{baseUrl}}/orders"
  headers:
    - name: Authorization
      value: Bearer {{JWT}}
  body:
    type: json
    data: |-
      {
        "userId": "3",
        "product": "P-3",
        "amount": 10
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Created
    request:
      url: "{{baseUrl}}/orders"
      method: POST
      body:
        type: json
        data: |-
          {
            "userId": "",
            "product": "",
            "amount": 0
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "userId": "",
            "product": "",
            "amount": 0,
            "status": "",
            "message": ""
          }
