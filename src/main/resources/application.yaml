spring:
  application:
    name: aegis_gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/aegis_gateway
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
