spring:
  application:
    name: aegis-gateway
  codec:
    max-in-memory-size: 1MB
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/aegis_gateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    properties:
      driverClassName: org.postgresql.r2dbc.postgresql.R2dbcPostgreSQLDriver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: ${services.user}
              predicates:
                - Path=/users/**

            - id: user-strip
              uri: ${services.user}
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1

            - id: order-service
              uri: ${services.order}
              predicates:
                - Path=/orders/**

            - id: order-strip
              uri: ${services.order}
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info

services:
  user: ${USER_SERVICE_URL:http://localhost:8081}
  order: ${ORDER_SERVICE_URL:http://localhost:8082}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG

gateway:
  security:
    jwt-secret: ;oiajsd;oirlawelkdjadnfalsdfjawhero23nr23r0hn34trjp4t;nfguq34tbrgu
    api-keys:
      - key: admin-key
        role: ROLE_ADMIN
      - key: user-key
        role: ROLE_USER
  validation:
    max-payload-size: 1048576
    required-headers: []
    allowed-content-types:
      - application/json
  cache:
    enabled: ${RATE_LIMIT_ENABLED:false}